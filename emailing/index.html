<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../img/icons/logo.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    
    <title>Catálogo de Correos - SICOM</title>
    
    <style>
        .emailing-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-4);
        }
        
        .search-panel {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            padding: var(--space-4);
            margin-bottom: var(--space-6);
        }
        
        .search-form {
            display: flex;
            gap: var(--space-3);
        }
        
        .search-input {
            flex: 1;
            padding: var(--space-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: border-color var(--transition-fast);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--color-primary), #6366f1);
            color: white;
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        
        .stat-card .icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }
        
        .stat-card .info .value {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
        }
        
        .stat-card .info .label {
            font-size: var(--font-size-sm);
            opacity: 0.9;
        }
        
        .table-wrapper {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            overflow: hidden;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: var(--bg-muted);
            padding: var(--space-3) var(--space-4);
            text-align: left;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color-light);
        }
        
        .data-table td {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--border-color-light);
        }
        
        .data-table tbody tr:hover {
            background: var(--bg-muted);
        }
        
        .data-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .email-cell {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .email-cell i {
            color: var(--color-primary);
        }
        
        .date-cell {
            color: var(--text-muted);
            font-size: var(--font-size-sm);
        }
        
        .empty-state {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: var(--space-4);
        }
        
        .loading {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-muted);
        }
        
        .loading i {
            animation: spin 1s linear infinite;
            font-size: 2rem;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Offline Banner -->
    <div id="offlineBanner" class="offline-banner">
        <i class="bi bi-wifi-off"></i> Sin conexión a internet
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <button class="btn btn-ghost" id="sidebarToggle" aria-label="Toggle menu">
            <i class="bi bi-list" style="font-size: 1.5rem;"></i>
        </button>
        
        <a class="navbar-brand" href="../dashboard.html">
            <i class="bi bi-shop"></i>
            <span>SICOM</span>
        </a>
        
        <div class="navbar-spacer"></div>
        
        <div class="navbar-user">
            <div class="navbar-info">
                <i class="bi bi-building"></i>
                <span id="negocioNombre">-</span>
            </div>
            <button class="btn btn-ghost btn-sm" id="btnLogout" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-nav">
            <li class="sidebar-item">
                <a class="sidebar-link" href="../dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-divider"></li>
            <li class="sidebar-header">Catálogos</li>
            <li class="sidebar-item">
                <a class="sidebar-link" href="../catalogos/index.html">
                    <i class="bi bi-folder"></i>
                    <span>Menú Catálogos</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link active" href="index.html">
                    <i class="bi bi-envelope"></i>
                    <span>Correos</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="emailing-container">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="bi bi-envelope"></i> Catálogo de Correos
                </h1>
            </div>

            <!-- Búsqueda -->
            <div class="search-panel">
                <form id="formBusqueda" class="search-form">
                    <input 
                        type="text" 
                        id="inputBusqueda" 
                        class="search-input" 
                        placeholder="Buscar por correo electrónico..."
                        autocomplete="off"
                    >
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i> Buscar
                    </button>
                    <button type="button" id="btnLimpiar" class="btn btn-outline" style="display: none;">
                        <i class="bi bi-x-lg"></i> Limpiar
                    </button>
                </form>
            </div>

            <!-- Estadística -->
            <div class="stat-card" id="statCard" style="display: none;">
                <div class="icon">
                    <i class="bi bi-envelope-fill"></i>
                </div>
                <div class="info">
                    <div class="value" id="totalCorreos">0</div>
                    <div class="label">Correos registrados</div>
                </div>
            </div>

            <!-- Loading -->
            <div id="loadingState" class="table-wrapper loading">
                <i class="bi bi-arrow-repeat"></i>
                <p>Cargando correos...</p>
            </div>

            <!-- Tabla -->
            <div id="tablaContainer" class="table-wrapper" style="display: none;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Correo Electrónico</th>
                            <th style="width: 150px;">Fecha Registro</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody">
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="table-wrapper empty-state" style="display: none;">
                <i class="bi bi-inbox"></i>
                <p>No se encontraron correos registrados.</p>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JavaScript -->
    <script src="../js/idb.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        // Variables
        let filtroActual = '';
        
        // DOM Elements
        const formBusqueda = document.getElementById('formBusqueda');
        const inputBusqueda = document.getElementById('inputBusqueda');
        const btnLimpiar = document.getElementById('btnLimpiar');
        const loadingState = document.getElementById('loadingState');
        const tablaContainer = document.getElementById('tablaContainer');
        const emptyState = document.getElementById('emptyState');
        const statCard = document.getElementById('statCard');
        
        // Cargar correos
        async function cargarCorreos(busqueda = '') {
            loadingState.style.display = 'block';
            tablaContainer.style.display = 'none';
            emptyState.style.display = 'none';
            statCard.style.display = 'none';
            
            try {
                const data = await SICOM.Emailing.listar(busqueda);
                
                document.getElementById('negocioNombre').textContent = data.negocio || '-';
                
                if (data.correos && data.correos.length > 0) {
                    renderizarTabla(data.correos);
                    document.getElementById('totalCorreos').textContent = data.total;
                    statCard.style.display = 'flex';
                    tablaContainer.style.display = 'block';
                } else {
                    emptyState.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Error:', error);
                SICOM.UI.toast('Error al cargar correos', 'error');
                emptyState.style.display = 'block';
            } finally {
                loadingState.style.display = 'none';
            }
        }
        
        // Renderizar tabla
        function renderizarTabla(correos) {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            
            correos.forEach(correo => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="email-cell">
                            <i class="bi bi-envelope"></i>
                            <span>${escapeHtml(correo.email)}</span>
                        </div>
                    </td>
                    <td class="date-cell">${correo.fecha_formato}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // Escapar HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Búsqueda
        formBusqueda.addEventListener('submit', (e) => {
            e.preventDefault();
            filtroActual = inputBusqueda.value.trim();
            btnLimpiar.style.display = filtroActual ? 'inline-flex' : 'none';
            cargarCorreos(filtroActual);
        });
        
        // Limpiar filtro
        btnLimpiar.addEventListener('click', () => {
            inputBusqueda.value = '';
            filtroActual = '';
            btnLimpiar.style.display = 'none';
            cargarCorreos();
        });
        
        // Sidebar
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            });
            
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
        }
        
        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('¿Deseas cerrar la sesión?')) {
                try { await SICOM.Auth.logout(); } catch (e) { console.error(e); }
            }
        });
        
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const session = SICOM.Session.getData();
            if (session) {
                document.getElementById('negocioNombre').textContent = session.negocio || '-';
            }
            initSidebar();
            cargarCorreos();
        });
    </script>
</body>
</html>
