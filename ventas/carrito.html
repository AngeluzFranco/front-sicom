<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../img/icons/logo.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    
    <title>Carrito - SICOM</title>
    
    <style>
        .carrito-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-4);
        }
        
        .carrito-item {
            display: flex;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            margin-bottom: var(--space-3);
        }
        
        .carrito-item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-md);
        }
        
        .carrito-item-info {
            flex: 1;
        }
        
        .carrito-item-nombre {
            font-weight: var(--font-weight-semibold);
            color: var(--text-primary);
            margin-bottom: var(--space-1);
        }
        
        .carrito-item-precio {
            color: var(--text-muted);
            font-size: var(--font-size-sm);
        }
        
        .carrito-item-promo {
            color: var(--color-success);
            font-size: var(--font-size-xs);
            margin-top: var(--space-1);
        }
        
        .carrito-item-cantidad {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .carrito-item-subtotal {
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
            min-width: 100px;
            text-align: right;
        }
        
        .carrito-item-forma {
            min-width: 100px;
        }
        
        .carrito-item-forma select {
            width: 100%;
            padding: var(--space-2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
        
        .carrito-item-actions {
            display: flex;
            align-items: center;
        }
        
        /* Resumen */
        .carrito-resumen {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            padding: var(--space-6);
            margin-top: var(--space-6);
        }
        
        .carrito-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            padding: var(--space-4) 0;
            border-top: 2px solid var(--border-color);
            margin-top: var(--space-4);
        }
        
        .carrito-total-valor {
            color: var(--color-primary);
            font-size: var(--font-size-2xl);
        }
        
        /* Cupón */
        .cupon-section {
            padding: var(--space-4) 0;
            border-bottom: 1px solid var(--border-color-light);
        }
        
        .cupon-input-group {
            display: flex;
            gap: var(--space-2);
            margin-top: var(--space-2);
        }
        
        .cupon-input-group input {
            flex: 1;
            padding: var(--space-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
        
        .cupon-resultado {
            margin-top: var(--space-2);
            font-size: var(--font-size-sm);
        }
        
        .cupon-resultado.valido {
            color: var(--color-success);
        }
        
        .cupon-resultado.invalido {
            color: var(--color-danger);
        }
        
        /* Acciones */
        .carrito-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: var(--space-4);
        }
        
        /* Empty state */
        .empty-carrito {
            text-align: center;
            padding: var(--space-10);
        }
        
        .empty-carrito i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: var(--space-4);
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .carrito-item {
                flex-direction: column;
            }
            
            .carrito-item-img {
                width: 100%;
                height: 150px;
            }
            
            .carrito-item-subtotal,
            .carrito-item-forma {
                min-width: auto;
                text-align: left;
                margin-top: var(--space-2);
            }
        }
    </style>
</head>
<body>
    <!-- Offline Banner -->
    <div id="offlineBanner" class="offline-banner">
        <i class="bi bi-wifi-off"></i> Sin conexión a internet
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <button class="btn btn-ghost" id="sidebarToggle" aria-label="Toggle menu">
            <i class="bi bi-list" style="font-size: 1.5rem;"></i>
        </button>
        
        <a class="navbar-brand" href="../dashboard.html">
            <i class="bi bi-shop"></i>
            <span>SICOM</span>
        </a>
        
        <div class="navbar-spacer"></div>
        
        <div class="navbar-user">
            <div class="navbar-info">
                <i class="bi bi-building"></i>
                <span id="negocioNombre">-</span>
            </div>
            <button class="btn btn-ghost btn-sm" id="btnLogout" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-nav">
            <li class="sidebar-item">
                <a class="sidebar-link" href="../dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" href="nueva.html">
                    <i class="bi bi-cart-plus"></i>
                    <span>Nueva Venta</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link active" href="carrito.html">
                    <i class="bi bi-cart3"></i>
                    <span>Ver Carrito</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-cart3"></i> Carrito de Compras
            </h1>
        </div>

        <div class="carrito-container">
            <!-- Items del carrito -->
            <div id="carritoItems">
                <div class="loading-spinner" style="text-align: center; padding: 40px;">
                    <i class="bi bi-arrow-repeat spin" style="font-size: 2rem; color: var(--color-primary);"></i>
                    <p>Cargando carrito...</p>
                </div>
            </div>

            <!-- Resumen del carrito -->
            <div class="carrito-resumen" id="carritoResumen" style="display: none;">
                <!-- Sección de cupón -->
                <div class="cupon-section" id="cuponSection" style="display: none;">
                    <label><strong>Cupón de descuento:</strong></label>
                    <div class="cupon-input-group">
                        <input type="text" id="cuponInput" placeholder="Ingresa tu código">
                        <button class="btn btn-outline" id="btnValidarCupon">Validar</button>
                    </div>
                    <div class="cupon-resultado" id="cuponResultado"></div>
                </div>

                <!-- Total -->
                <div class="carrito-total">
                    <span>Total a pagar:</span>
                    <span class="carrito-total-valor" id="totalCarrito">$0.00</span>
                </div>

                <!-- Acciones -->
                <div class="carrito-actions">
                    <button class="btn btn-success btn-lg" id="btnRealizarVenta">
                        <i class="bi bi-check-circle"></i> Realizar Venta
                    </button>
                    <button class="btn btn-outline btn-danger" id="btnVaciarCarrito">
                        <i class="bi bi-trash"></i> Vaciar Carrito
                    </button>
                    <a href="nueva.html" class="btn btn-outline">
                        <i class="bi bi-plus-circle"></i> Seguir Comprando
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JavaScript -->
    <script src="../js/idb.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        // Estado local
        let carritoData = null;
        let formasPago = {};
        let cuponValidado = null;
        
        // DOM Elements
        const carritoItems = document.getElementById('carritoItems');
        const carritoResumen = document.getElementById('carritoResumen');
        const totalCarrito = document.getElementById('totalCarrito');
        const cuponSection = document.getElementById('cuponSection');
        const cuponInput = document.getElementById('cuponInput');
        const cuponResultado = document.getElementById('cuponResultado');
        
        // Cargar carrito
        async function cargarCarrito() {
            try {
                const data = await SICOM.Carrito.obtener();
                carritoData = data;
                
                if (data.items.length === 0) {
                    mostrarCarritoVacio();
                    return;
                }
                
                renderizarCarrito(data);
                carritoResumen.style.display = 'block';
                
                // Mostrar sección de cupón si aplica
                if (data.puede_usar_cupon) {
                    cuponSection.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Error cargando carrito:', error);
                carritoItems.innerHTML = `
                    <div class="empty-carrito">
                        <i class="bi bi-exclamation-triangle"></i>
                        <h3>Error al cargar el carrito</h3>
                        <button class="btn btn-primary" onclick="cargarCarrito()">Reintentar</button>
                    </div>
                `;
            }
        }
        
        // Mostrar carrito vacío
        function mostrarCarritoVacio() {
            carritoItems.innerHTML = `
                <div class="empty-carrito">
                    <i class="bi bi-cart-x"></i>
                    <h3>Tu carrito está vacío</h3>
                    <p>Agrega productos para comenzar</p>
                    <a href="nueva.html" class="btn btn-primary">
                        <i class="bi bi-cart-plus"></i> Ir a productos
                    </a>
                </div>
            `;
            carritoResumen.style.display = 'none';
        }
        
        // Renderizar carrito
        function renderizarCarrito(data) {
            carritoItems.innerHTML = data.items.map(item => {
                // Guardar forma de pago por defecto
                formasPago[item.cod_producto] = formasPago[item.cod_producto] || 'EFE';
                
                return `
                <div class="carrito-item">
                    <img class="carrito-item-img" 
                         src="${SICOM.APP_CONFIG.apiBaseUrl}/uploads/productos/${item.imagen}"
                         alt="${item.nombre}"
                         onerror="this.src='${SICOM.APP_CONFIG.apiBaseUrl}/uploads/productos/logoPI.png'">
                    
                    <div class="carrito-item-info">
                        <div class="carrito-item-nombre">${item.nombre}</div>
                        <div class="carrito-item-precio">
                            ${SICOM.Utils.formatCurrency(item.precio_unitario)} c/u
                        </div>
                        ${item.promocion ? `<div class="carrito-item-promo">✨ Promo ${item.promocion} aplicada</div>` : ''}
                        <div class="carrito-item-cantidad">
                            <span>Cantidad: <strong>${item.cantidad}</strong></span>
                        </div>
                    </div>
                    
                    <div class="carrito-item-forma">
                        <label style="font-size: 12px; color: var(--text-muted);">Forma de pago</label>
                        <select onchange="cambiarFormaPago(${item.cod_producto}, this.value)">
                            <option value="EFE" ${formasPago[item.cod_producto] === 'EFE' ? 'selected' : ''}>Efectivo</option>
                            <option value="TDC" ${formasPago[item.cod_producto] === 'TDC' ? 'selected' : ''}>T. Crédito</option>
                            <option value="TDD" ${formasPago[item.cod_producto] === 'TDD' ? 'selected' : ''}>T. Débito</option>
                        </select>
                    </div>
                    
                    <div class="carrito-item-subtotal">
                        ${SICOM.Utils.formatCurrency(item.subtotal)}
                    </div>
                    
                    <div class="carrito-item-actions">
                        <button class="btn btn-ghost btn-sm text-danger" onclick="quitarProducto(${item.cod_producto})" title="Quitar">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
            
            // Actualizar total
            totalCarrito.textContent = SICOM.Utils.formatCurrency(data.total);
        }
        
        // Cambiar forma de pago
        function cambiarFormaPago(codProducto, forma) {
            formasPago[codProducto] = forma;
        }
        
        // Quitar producto
        async function quitarProducto(codProducto) {
            if (!confirm('¿Quitar este producto del carrito?')) return;
            
            try {
                await SICOM.Carrito.quitarProducto(codProducto);
                SICOM.UI.toast('Producto eliminado', 'success');
                cargarCarrito();
            } catch (error) {
                console.error('Error quitando producto:', error);
                SICOM.UI.toast('Error al quitar producto', 'error');
            }
        }
        
        // Validar cupón
        document.getElementById('btnValidarCupon').addEventListener('click', async () => {
            const codigo = cuponInput.value.trim();
            
            if (!codigo) {
                cuponResultado.textContent = '⚠️ Ingresa un código de cupón';
                cuponResultado.className = 'cupon-resultado invalido';
                return;
            }
            
            try {
                const result = await SICOM.Carrito.validarCupon(codigo);
                
                if (result.valido) {
                    cuponResultado.textContent = `✅ Cupón válido. Descuento: ${result.descuento}`;
                    cuponResultado.className = 'cupon-resultado valido';
                    cuponValidado = codigo;
                } else {
                    cuponResultado.textContent = '❌ Cupón inválido o vencido';
                    cuponResultado.className = 'cupon-resultado invalido';
                    cuponValidado = null;
                }
            } catch (error) {
                console.error('Error validando cupón:', error);
                cuponResultado.textContent = '⚠️ Error validando cupón';
                cuponResultado.className = 'cupon-resultado invalido';
            }
        });
        
        // Vaciar carrito
        document.getElementById('btnVaciarCarrito').addEventListener('click', async () => {
            if (!confirm('¿Estás seguro de vaciar el carrito?')) return;
            
            try {
                await SICOM.Carrito.vaciar();
                SICOM.UI.toast('Carrito vaciado', 'success');
                mostrarCarritoVacio();
            } catch (error) {
                console.error('Error vaciando carrito:', error);
                SICOM.UI.toast('Error al vaciar carrito', 'error');
            }
        });
        
        // Realizar venta
        document.getElementById('btnRealizarVenta').addEventListener('click', async () => {
            if (!confirm('¿Confirmar venta?')) return;
            
            const btn = document.getElementById('btnRealizarVenta');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Procesando...';
            
            try {
                const result = await SICOM.Carrito.realizarVenta(formasPago, cuponValidado || '');
                
                SICOM.UI.toast('¡Venta realizada exitosamente!', 'success');
                
                // Redirigir al detalle de venta
                setTimeout(() => {
                    window.location.href = `detalle.html?mov=${result.cod_movimiento}`;
                }, 1000);
                
            } catch (error) {
                console.error('Error realizando venta:', error);
                SICOM.UI.toast('Error al procesar la venta', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-circle"></i> Realizar Venta';
            }
        });
        
        // Sidebar toggle
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            });
            
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
        }
        
        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('¿Deseas cerrar la sesión?')) {
                try {
                    await SICOM.Auth.logout();
                } catch (error) {
                    console.error('Error en logout:', error);
                }
            }
        });
        
        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            const session = SICOM.Session.getData();
            if (session) {
                document.getElementById('negocioNombre').textContent = session.negocio || '-';
            }
            
            initSidebar();
            cargarCarrito();
        });
    </script>
</body>
</html>
