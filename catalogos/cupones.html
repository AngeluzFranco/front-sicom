<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../img/icons/logo.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    
    <title>Cupones - SICOM</title>
    
    <style>
        .cupones-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-4);
        }
        
        /* Panel de formulario */
        .form-panel {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }
        
        .form-panel h3 {
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--space-4);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }
        
        .form-group input,
        .form-group select {
            padding: var(--space-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .form-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
        }
        
        /* Tabla de cupones */
        .table-wrapper {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
            overflow: hidden;
        }
        
        .cupones-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .cupones-table th {
            background: var(--bg-muted);
            padding: var(--space-4);
            text-align: left;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color-light);
        }
        
        .cupones-table td {
            padding: var(--space-4);
            border-bottom: 1px solid var(--border-color-light);
            vertical-align: middle;
        }
        
        .cupones-table tbody tr:hover {
            background: var(--bg-muted);
        }
        
        .cupones-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-danger);
        }
        
        .badge-percent {
            background: rgba(79, 70, 229, 0.1);
            color: var(--color-primary);
        }
        
        .badge-fijo {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }
        
        /* Acciones */
        .row-actions {
            display: flex;
            gap: var(--space-2);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .table-wrapper {
                overflow-x: auto;
            }
            
            .cupones-table {
                min-width: 800px;
            }
        }
    </style>
</head>
<body>
    <!-- Offline Banner -->
    <div id="offlineBanner" class="offline-banner">
        <i class="bi bi-wifi-off"></i> Sin conexión a internet
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <button class="btn btn-ghost" id="sidebarToggle" aria-label="Toggle menu">
            <i class="bi bi-list" style="font-size: 1.5rem;"></i>
        </button>
        
        <a class="navbar-brand" href="../dashboard.html">
            <i class="bi bi-shop"></i>
            <span>SICOM</span>
        </a>
        
        <div class="navbar-spacer"></div>
        
        <div class="navbar-user">
            <div class="navbar-info">
                <i class="bi bi-building"></i>
                <span id="negocioNombre">-</span>
            </div>
            <button class="btn btn-ghost btn-sm" id="btnLogout" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-nav">
            <li class="sidebar-item">
                <a class="sidebar-link" href="../dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-divider"></li>
            <li class="sidebar-header">Catálogos</li>
            <li class="sidebar-item">
                <a class="sidebar-link" href="index.html">
                    <i class="bi bi-folder"></i>
                    <span>Menú Catálogos</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link active" href="cupones.html">
                    <i class="bi bi-ticket-perforated"></i>
                    <span>Cupones</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" href="promociones.html">
                    <i class="bi bi-percent"></i>
                    <span>Promociones</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="cupones-container">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="bi bi-ticket-perforated"></i> Administración de Cupones
                </h1>
            </div>

            <!-- Formulario -->
            <div class="form-panel">
                <h3 id="formTitle"><i class="bi bi-plus-circle"></i> Agregar Cupón</h3>
                <form id="formCupon">
                    <input type="hidden" id="codCupon" name="cod_cupon">
                    <input type="hidden" id="modoForm" name="modo" value="insertar">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="codigo">Código</label>
                            <input type="text" id="codigo" name="codigo" required placeholder="Ej: DESCUENTO20">
                        </div>
                        <div class="form-group">
                            <label for="tipo">Tipo de Descuento</label>
                            <select id="tipo" name="tipo" required>
                                <option value="%">Porcentaje (%)</option>
                                <option value="FIJO">Monto Fijo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor</label>
                            <input type="number" id="valor" name="valor" step="0.01" min="0" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="cantidad">Cantidad Disponible</label>
                            <input type="number" id="cantidad" name="cantidad" min="0" required placeholder="100">
                        </div>
                        <div class="form-group">
                            <label for="fechaInicio">Fecha Inicio</label>
                            <input type="date" id="fechaInicio" name="fecha_inicio" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaFin">Fecha Fin</label>
                            <input type="date" id="fechaFin" name="fecha_fin" required>
                        </div>
                        <div class="form-group">
                            <label for="estatus">Estatus</label>
                            <select id="estatus" name="estatus" required>
                                <option value="A">Activo</option>
                                <option value="I">Inactivo</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success" id="btnGuardar">
                            <i class="bi bi-check-lg"></i> Guardar
                        </button>
                        <button type="button" class="btn btn-ghost" id="btnCancelar" style="display: none;">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <!-- Tabla de cupones -->
            <div class="table-wrapper">
                <table class="cupones-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Código</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Cantidad</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Estatus</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuponesTableBody">
                        <tr>
                            <td colspan="9" style="text-align: center; padding: 40px;">
                                <i class="bi bi-arrow-repeat spin" style="font-size: 2rem; color: var(--color-primary);"></i>
                                <p>Cargando cupones...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JavaScript -->
    <script src="../js/idb.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        // Estado
        let cuponesData = [];
        let editando = false;
        
        // DOM Elements
        const formCupon = document.getElementById('formCupon');
        const formTitle = document.getElementById('formTitle');
        const btnCancelar = document.getElementById('btnCancelar');
        const cuponesTableBody = document.getElementById('cuponesTableBody');
        
        // Cargar cupones
        async function cargarCupones() {
            try {
                const data = await SICOM.Cupones.listar();
                cuponesData = data.cupones || [];
                renderizarCupones();
            } catch (error) {
                console.error('Error cargando cupones:', error);
                cuponesTableBody.innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            <i class="bi bi-exclamation-triangle" style="font-size: 2rem; color: var(--color-danger);"></i>
                            <p>Error al cargar cupones</p>
                            <button class="btn btn-primary btn-sm" onclick="cargarCupones()">Reintentar</button>
                        </td>
                    </tr>
                `;
            }
        }
        
        // Renderizar tabla
        function renderizarCupones() {
            if (cuponesData.length === 0) {
                cuponesTableBody.innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            <i class="bi bi-ticket" style="font-size: 2rem; color: var(--text-muted);"></i>
                            <p>No hay cupones registrados</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            cuponesTableBody.innerHTML = cuponesData.map(cupon => `
                <tr data-id="${cupon.cod_cupon}">
                    <td>${cupon.cod_cupon}</td>
                    <td><strong>${cupon.codigo}</strong></td>
                    <td>
                        <span class="badge ${cupon.tipo_descuento === '%' ? 'badge-percent' : 'badge-fijo'}">
                            ${cupon.tipo_descuento === '%' ? 'Porcentaje' : 'Fijo'}
                        </span>
                    </td>
                    <td>${cupon.tipo_descuento === '%' ? cupon.valor + '%' : SICOM.Utils.formatCurrency(cupon.valor)}</td>
                    <td>${cupon.cantidad}</td>
                    <td>${formatearFecha(cupon.fecha_inicio)}</td>
                    <td>${formatearFecha(cupon.fecha_fin)}</td>
                    <td>
                        <span class="badge ${cupon.estatus === 'A' ? 'badge-success' : 'badge-danger'}">
                            ${cupon.estatus === 'A' ? 'Activo' : 'Inactivo'}
                        </span>
                    </td>
                    <td>
                        <div class="row-actions">
                            <button class="btn btn-warning btn-sm" onclick="editarCupon('${cupon.cod_cupon}')" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="eliminarCupon('${cupon.cod_cupon}', '${cupon.codigo}')" title="Eliminar">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // Formatear fecha
        function formatearFecha(fecha) {
            if (!fecha) return '-';
            const d = new Date(fecha + 'T00:00:00');
            return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        
        // Guardar cupón (insertar o actualizar)
        formCupon.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const datos = {
                codigo: document.getElementById('codigo').value,
                tipo: document.getElementById('tipo').value,
                valor: document.getElementById('valor').value,
                cantidad: document.getElementById('cantidad').value,
                fecha_inicio: document.getElementById('fechaInicio').value,
                fecha_fin: document.getElementById('fechaFin').value,
                estatus: document.getElementById('estatus').value
            };
            
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Guardando...';
            
            try {
                if (editando) {
                    datos.cod_cupon = document.getElementById('codCupon').value;
                    await SICOM.Cupones.actualizar(datos);
                    SICOM.UI.toast('Cupón actualizado correctamente', 'success');
                } else {
                    await SICOM.Cupones.insertar(datos);
                    SICOM.UI.toast('Cupón agregado correctamente', 'success');
                }
                
                limpiarFormulario();
                cargarCupones();
            } catch (error) {
                console.error('Error guardando cupón:', error);
                SICOM.UI.toast('Error al guardar cupón', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-lg"></i> Guardar';
            }
        });
        
        // Editar cupón
        function editarCupon(codCupon) {
            const cupon = cuponesData.find(c => c.cod_cupon == codCupon);
            if (!cupon) return;
            
            editando = true;
            document.getElementById('codCupon').value = cupon.cod_cupon;
            document.getElementById('codigo').value = cupon.codigo;
            document.getElementById('tipo').value = cupon.tipo_descuento;
            document.getElementById('valor').value = cupon.valor;
            document.getElementById('cantidad').value = cupon.cantidad;
            document.getElementById('fechaInicio').value = cupon.fecha_inicio;
            document.getElementById('fechaFin').value = cupon.fecha_fin;
            document.getElementById('estatus').value = cupon.estatus;
            
            formTitle.innerHTML = '<i class="bi bi-pencil"></i> Editar Cupón';
            btnCancelar.style.display = 'inline-flex';
            
            // Scroll al formulario
            formCupon.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Eliminar cupón
        async function eliminarCupon(codCupon, codigo) {
            if (!confirm(`¿Eliminar el cupón "${codigo}"?`)) return;
            
            try {
                await SICOM.Cupones.eliminar(codCupon);
                SICOM.UI.toast('Cupón eliminado', 'success');
                cargarCupones();
            } catch (error) {
                console.error('Error eliminando cupón:', error);
                SICOM.UI.toast('Error al eliminar cupón', 'error');
            }
        }
        
        // Cancelar edición
        btnCancelar.addEventListener('click', limpiarFormulario);
        
        // Limpiar formulario
        function limpiarFormulario() {
            formCupon.reset();
            document.getElementById('codCupon').value = '';
            editando = false;
            formTitle.innerHTML = '<i class="bi bi-plus-circle"></i> Agregar Cupón';
            btnCancelar.style.display = 'none';
        }
        
        // Sidebar toggle
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            });
            
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            });
        }
        
        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('¿Deseas cerrar la sesión?')) {
                try {
                    await SICOM.Auth.logout();
                } catch (error) {
                    console.error('Error en logout:', error);
                }
            }
        });
        
        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            const session = SICOM.Session.getData();
            if (session) {
                document.getElementById('negocioNombre').textContent = session.negocio || '-';
            }
            
            initSidebar();
            cargarCupones();
        });
    </script>
</body>
</html>
