<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  
  <!-- Store/Shop Icon -->
  <g fill="white">
    <!-- Roof -->
    <path d="M86 180 L256 80 L426 180 L426 200 L86 200 Z"/>
    
    <!-- Building -->
    <rect x="106" y="200" width="300" height="200" rx="10"/>
    
    <!-- Door -->
    <rect x="216" y="280" width="80" height="120" rx="5" fill="#667eea"/>
    
    <!-- Windows -->
    <rect x="126" y="240" width="60" height="60" rx="5" fill="#667eea"/>
    <rect x="326" y="240" width="60" height="60" rx="5" fill="#667eea"/>
    
    <!-- Sign/Label -->
    <rect x="166" y="420" width="180" height="40" rx="8"/>
  </g>
  
  <!-- S Letter (for SICOM) -->
  <text x="256" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#667eea">SICOM</text>
</svg>
