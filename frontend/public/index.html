<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="SICOM - Sistema de Punto de Venta">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="img/icons/logo.jpg">
    <link rel="apple-touch-icon" href="img/icons/logo.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="css/theme.css">
    
    <title>Iniciar Sesión - SICOM</title>
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            background: linear-gradient(135deg, var(--color-gray-50) 0%, var(--color-gray-100) 100%);
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.4s ease;
        }
        
        .login-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: var(--space-8);
            border: 1px solid var(--border-color-light);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        
        .login-logo {
            width: 72px;
            height: 72px;
            background: var(--color-primary-light);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-4);
        }
        
        .login-logo i {
            font-size: 32px;
            color: var(--color-primary);
        }
        
        .login-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--text-primary);
            margin: 0 0 var(--space-2);
        }
        
        .login-subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
            margin: 0;
        }
        
        .form-icon-input {
            position: relative;
        }
        
        .form-icon-input i {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
        }
        
        .form-icon-input .form-input,
        .form-icon-input .form-select {
            padding-left: calc(var(--space-4) + 24px);
        }
        
        .form-icon-input .form-input:focus + i,
        .form-icon-input .form-select:focus + i {
            color: var(--color-primary);
        }
        
        .alert {
            padding: var(--space-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-5);
            display: none;
            align-items: center;
            gap: var(--space-3);
            font-size: var(--font-size-sm);
            animation: slideUp 0.3s ease;
        }
        
        .alert.show {
            display: flex;
        }
        
        .alert-error {
            background-color: var(--color-danger-light);
            color: var(--color-danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .login-footer {
            text-align: center;
            margin-top: var(--space-6);
        }
        
        .login-footer p {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin: 0;
        }
        
        /* Loading state for form */
        .form-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        
        .form-loading::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.5);
            border-radius: var(--radius-xl);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="bi bi-shop"></i>
                </div>
                <h1 class="login-title">SICOM</h1>
                <p class="login-subtitle">Sistema de Punto de Venta</p>
            </div>
            
            <div id="errorMessage" class="alert alert-error">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            
            <form id="loginForm" method="POST">
                <div class="form-group">
                    <label class="form-label" for="usuario">Usuario</label>
                    <div class="form-icon-input">
                        <input type="text" 
                               class="form-input" 
                               name="usuario" 
                               id="usuario" 
                               placeholder="Ingresa tu ID de usuario" 
                               required 
                               autocomplete="username">
                        <i class="bi bi-person"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="form-icon-input">
                        <input type="password" 
                               class="form-input" 
                               name="password" 
                               id="password" 
                               placeholder="Ingresa tu contraseña" 
                               required
                               autocomplete="current-password">
                        <i class="bi bi-lock"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="cod_negocio">Negocio</label>
                    <div class="form-icon-input">
                        <select class="form-select" name="cod_negocio" id="cod_negocio" required>
                            <option value="">Cargando negocios...</option>
                        </select>
                        <i class="bi bi-building"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="cod_espacio">Espacio / Sucursal</label>
                    <div class="form-icon-input">
                        <select class="form-select" name="cod_espacio" id="cod_espacio" required>
                            <option value="">Selecciona un negocio primero</option>
                        </select>
                        <i class="bi bi-geo-alt"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span id="btnLoginText">Iniciar Sesión</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>© 2026 SICOM - Todos los derechos reservados</p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JavaScript App -->
    <script src="js/idb.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const negocioSelect = document.getElementById('cod_negocio');
        const espacioSelect = document.getElementById('cod_espacio');
        const usuarioInput = document.getElementById('usuario');
        const btnLogin = document.getElementById('btnLogin');
        const btnLoginText = document.getElementById('btnLoginText');
        
        // Mostrar error
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
        
        // Mostrar/ocultar loading
        function setLoading(show) {
            if (show) {
                btnLogin.classList.add('btn-loading');
                btnLoginText.textContent = 'Ingresando...';
                loginForm.classList.add('form-loading');
            } else {
                btnLogin.classList.remove('btn-loading');
                btnLoginText.textContent = 'Iniciar Sesión';
                loginForm.classList.remove('form-loading');
            }
        }
        
        // Cargar negocios al iniciar
        async function cargarNegocios() {
            try {
                // Usar endpoint de negocios en producción
                const response = await fetch(`${APP_CONFIG.apiBaseUrl}/negocios/listar.php?estado=VIGENTES`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('Error al cargar negocios');
                }
                
                const result = await response.json();
                const negocios = result.data || result;
                
                negocioSelect.innerHTML = '<option value="">Selecciona un negocio</option>';
                
                if (negocios && negocios.length > 0) {
                    negocios.forEach(negocio => {
                        const option = document.createElement('option');
                        option.value = negocio.COD_NEGOCIO || negocio.cod_negocio;
                        option.textContent = negocio.NOMBRE || negocio.nombre;
                        negocioSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error cargando negocios:', error);
                negocioSelect.innerHTML = '<option value="">Error al cargar</option>';
                // En modo demo, cargar datos de prueba
                cargarNegociosDemo();
            }
        }
        
        // Datos de prueba para desarrollo
        function cargarNegociosDemo() {
            negocioSelect.innerHTML = `
                <option value="">Selecciona un negocio</option>
                <option value="1">Negocio Demo 1</option>
                <option value="2">Negocio Demo 2</option>
            `;
        }
        
        // Cargar espacios usando Auth.getEspacios
        async function cargarEspacios() {
            const codNegocio = negocioSelect.value;
            const usuario = usuarioInput.value;
            
            if (!codNegocio) {
                espacioSelect.innerHTML = '<option value="">Selecciona un negocio primero</option>';
                return;
            }
            
            try {
                espacioSelect.innerHTML = '<option value="">Cargando espacios...</option>';
                
                // Usar el módulo Auth para obtener espacios
                const espacios = await Auth.getEspacios(codNegocio, usuario);
                
                espacioSelect.innerHTML = '<option value="">Selecciona un espacio</option>';
                
                if (espacios && espacios.length > 0) {
                    espacios.forEach(espacio => {
                        const option = document.createElement('option');
                        option.value = espacio.cod_espacio || espacio.COD_ESPACIO;
                        option.textContent = espacio.descripcion || espacio.DESCRIPCION || espacio.NOMBRE;
                        espacioSelect.appendChild(option);
                    });
                } else {
                    espacioSelect.innerHTML = '<option value="">No hay espacios disponibles</option>';
                }
            } catch (error) {
                console.error('Error cargando espacios:', error);
                // En modo demo, cargar datos de prueba
                cargarEspaciosDemo();
            }
        }
        
        // Datos de prueba para desarrollo
        function cargarEspaciosDemo() {
            espacioSelect.innerHTML = `
                <option value="">Selecciona un espacio</option>
                <option value="1">Espacio Principal</option>
                <option value="2">Sucursal Norte</option>
            `;
        }
        
        // Manejar envío del formulario usando Auth.login
        async function handleLogin(e) {
            e.preventDefault();
            
            const credentials = {
                usuario: usuarioInput.value,
                password: document.getElementById('password').value,
                cod_negocio: negocioSelect.value,
                cod_espacio: espacioSelect.value
            };
            
            // Validación básica
            if (!credentials.usuario || !credentials.password || !credentials.cod_negocio || !credentials.cod_espacio) {
                showError('Por favor completa todos los campos');
                return;
            }
            
            try {
                setLoading(true);
                
                // Usar el módulo Auth para login
                const result = await Auth.login(credentials);
                
                // Login exitoso - redirigir al dashboard
                window.location.href = result.data?.redirect || 'dashboard.html';
                
            } catch (error) {
                console.error('Error en login:', error);
                showError(error.message || 'Usuario no autorizado o datos incorrectos.');
            } finally {
                setLoading(false);
            }
        }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Si ya hay sesión activa, redirigir al dashboard
            if (Session.isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            cargarNegocios();
            
            // Registrar Service Worker para PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado:', reg.scope))
                    .catch(err => console.error('Error registrando SW:', err));
            }
        });
        
        negocioSelect.addEventListener('change', cargarEspacios);
        loginForm.addEventListener('submit', handleLogin);
    </script>
</body>
</html>
