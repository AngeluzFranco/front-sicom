<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <meta name="robots" content="noindex, nofollow">
    <title>Bad Gateway (502) - SICOM</title>
    <link rel="icon" href="../img/icons/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="errors.css">
</head>
<body>
    <div class="error-container">
        <!-- Logo -->
        <div class="error-logo">
            <span class="error-logo-text">SICOM</span>
        </div>

        <!-- Offline Banner -->
        <div class="offline-banner">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
            </svg>
            <span>Estás sin conexión a internet</span>
        </div>

        <!-- Icon -->
        <div class="error-icon error-icon--danger">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
            </svg>
        </div>

        <!-- Error Code -->
        <div class="error-code error-code--danger">502</div>

        <!-- Content -->
        <h1 class="error-title">Puerta de enlace incorrecta</h1>
        <p class="error-description">
            El servidor recibió una respuesta inválida. Esto suele ser temporal 
            y puede deberse a mantenimiento o alta demanda. Intenta nuevamente en unos momentos.
        </p>

        <!-- Reference Code -->
        <div class="error-ref" style="display: none;"></div>

        <!-- Status -->
        <div class="error-status">
            <span class="error-status-dot"></span>
            <span>Verificando estado...</span>
        </div>

        <!-- Actions -->
        <div class="error-actions">
            <div class="error-btn-row">
                <button type="button" class="error-btn error-btn--primary" data-action="retry">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Reintentar
                </button>
                <a href="/" class="error-btn error-btn--secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Ir al inicio
                </a>
            </div>
            <button type="button" class="error-btn error-btn--ghost" data-action="back">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Volver atrás
            </button>
        </div>

        <!-- Footer -->
        <div class="error-footer">
            <span data-product-name>SICOM</span> &copy; <span data-year></span>
        </div>
    </div>

    <script src="errors.js"></script>
</body>
</html>
